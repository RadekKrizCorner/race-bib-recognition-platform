apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingest-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ingest-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ingest-api
    spec:
      containers:
        - name: ingest-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
