apiVersion: apps/v1
kind: Deployment
metadata:
  name: bib-detection-service
  namespace: race-bib-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bib-detection-service
  template:
    metadata:
      labels:
        app: bib-detection-service
    spec:
      containers:
        - name: worker
          image: race-bib-platform/worker:local
          command: ["uv", "run", "python", "-m", "rbp_bib_detection_service.main"]
          envFrom:
            - configMapRef:
                name: rbp-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
